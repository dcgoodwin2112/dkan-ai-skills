# Skills currency manifest
#
# The version-pinned facts each skill asserts, with the authoritative source to
# verify each against. This centralizes claims that are otherwise scattered across
# SKILL.md "Version notes" sections and inline citations, so currency can be audited
# in one pass instead of re-reading every doc.
#
# Checked by the `/check-skill-currency` repo command (.claude/commands/), which
# fetches each source, flags drift, and bumps `last_verified` on confirmed entries.
# `cadence` sets how often an entry is worth re-checking; `volatility` is how likely
# it is to have changed since `last_verified`.
#
# When you add or materially change a skill, add/adjust its entries here.

meta:
  last_full_review: 2026-07-08
  # Bump when the whole manifest is re-reconciled against sources.

# Where to verify each upstream. Claims reference these by key.
sources:
  drupal_core:
    releases: https://www.drupal.org/project/drupal/releases
    change_records: https://www.drupal.org/list-changes/drupal
    notes: Minor releases land ~every 6 months; change records are continuous.
  drupal_ai:
    project: https://www.drupal.org/project/ai
    releases: https://www.drupal.org/project/ai/releases
    repo: https://git.drupalcode.org/project/ai
  mcp_server:
    project: https://www.drupal.org/project/mcp_server
    repo: https://git.drupalcode.org/project/mcp_server
    sdk: https://github.com/modelcontextprotocol/php-sdk
    notes: Pre-release and volatile; expect churn between checks. mcp/sdk 0.6.0 tagged 2026-06-02 (Packagist mcp/sdk = modelcontextprotocol/php-sdk, PHP Foundation + Symfony). First module tag 2.0.0-alpha1 2026-06-11; in-tree submodules (oauth/tool_bridge/ui/examples) extracted to separate companion projects 2026-06-09 (issue 3585898).
  dkan_mcp_server:
    project: https://www.drupal.org/project/dkan_mcp_server
    repo: https://git.drupalcode.org/project/dkan_mcp_server
    notes: DKAN-side MCP module; migrated to drupal.org 2026-06 (1.0.x, alpha releases). bin/eval live verifies skill-doc claims against the running site. Legacy dkan_mcp retired 2026-06-11.
  dkan_ai_query:
    project: https://www.drupal.org/project/dkan_ai_query
    repo: https://git.drupalcode.org/project/dkan_ai_query
    notes: Renamed from dkan_drupal_ai_query and migrated to drupal.org 2026-06-11 (0.x).
  dkan:
    repo: https://github.com/GetDKAN/dkan
    releases: https://www.drupal.org/project/dkan/releases
    packagist_legacy: https://packagist.org/packages/getdkan/dkan
    branch: 4.x
    notes: DKAN v4 released March 2026 as drupal/dkan on drupal.org; getdkan/dkan (Packagist) is legacy v2/v3. Dev continues on the GitHub 4.x branch.
  dkan_frontend:
    app: https://github.com/GetDKAN/data-catalog-app
    components_current: https://github.com/GetDKAN/cmsds-open-data-components
    components_legacy: https://github.com/GetDKAN/data-catalog-components
    npm_current: https://www.npmjs.com/package/@civicactions/cmsds-open-data-components
  dcat_us:
    pod_v11: https://resources.data.gov/resources/dcat-us/
    v3: https://resources.data.gov/resources/dcat-us3/
    notes: Slow-moving; DCAT-US 3.0 (RDF) published as the federal successor (v1.1 in transition, still harvested); not in DKAN 4.x.
  ai_security:
    owasp_llm: https://genai.owasp.org/llm-top-10/
    owasp_agentic: https://genai.owasp.org/resource/owasp-top-10-for-agentic-applications-for-2026/
    mcp_security: https://cheatsheetseries.owasp.org/cheatsheets/MCP_Security_Cheat_Sheet.html
    notes: OWASP GenAI lists revise periodically — verify the cited IDs/threats match the current published list. MCP protocol security guidance lives in the MCP spec + the OWASP MCP cheat sheet.
  drupalcode:
    gitlab: https://git.drupalcode.org
    glab_releases: https://gitlab.com/gitlab-org/cli/-/releases
    notes: drupal.org's GitLab instance. The git remote host (git.drupal.org) differs from the web/API host (git.drupalcode.org) — the mismatch glab's high-level commands trip on. A glab release could fix the host handling and obsolete the raw-API workaround.
  drupalorg_credit:
    gitlab_issues: https://www.drupal.org/docs/develop/issues/gitlab-issues-for-drupalorg-projects
    granting_credit: https://www.drupal.org/docs/develop/issues/issue-procedures-and-etiquette/granting-credit-to-issue-contributors
    abuse_policy: https://www.drupal.org/drupalorg/docs/marketplace/abuse-of-the-contribution-credit-system
    optin: https://git.drupalcode.org/project/drupalorg/-/work_items/3409678
    notes: Credit + issue tracking mid-migration (2026) — classic d.o. queues moving to GitLab issues per-project via DA-managed opt-in; credit moved to the Contribution Records system. Expect mechanics to shift until migration completes.

skills:

  drupal-module-dev:
    targets: "Drupal ^10.2 || ^11, PHP 8.3"
    claims:
      - subject: PHP / Symfony floor
        claim: "D11.0 raised the floor to PHP 8.3 and Symfony 7."
        source: drupal_core/releases
        cadence: monthly
        volatility: low
        last_verified: 2026-07-08
      - subject: OOP hooks
        claim: "#[Hook] introduced in D11.1; OOP preprocess in D11.2 (backported to 11.1.8); ordering via order: or #[ReorderHook] in D11.2; #[LegacyHook] bridges D10."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Plugin attribute/annotation timeline
        claim: "Attributes introduced D10.2; omitting the attribute class deprecated ~D11.2; required D12; @Annotation discovery removed D13."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Entity query accessCheck
        claim: "->accessCheck() mandatory; deprecated 9.2, throws since Drupal 10 if omitted."
        source: drupal_core/change_records
        cadence: quarterly
        volatility: low
        last_verified: 2026-07-08
      - subject: JS once
        claim: "jQuery.once removed in D10; use core/once."
        source: drupal_core/change_records
        cadence: quarterly
        volatility: low
        last_verified: 2026-07-08
      - subject: Removed core modules
        claim: "D11 removed Book, Forum, Statistics, Tracker, Tour, Actions UI to contrib."
        source: drupal_core/releases
        cadence: quarterly
        volatility: low
        last_verified: 2026-07-08
      - subject: Config schema validation
        claim: "Strict config schema checking since D10.2; FullyValidatable constraint added D10.3."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08
      - subject: drupal.org GitLab / glab workflow
        claim: "glab high-level commands (mr create, …) fail on the git.drupal.org vs git.drupalcode.org host mismatch — use the raw API form (GITLAB_HOST + --hostname + numeric project id, params as -f fields, never query strings in a POST path); MR-branch pushes don't reliably auto-spawn merged-result pipelines (trigger via POST merge_requests/<iid>/pipelines); allow_failure jobs (e.g. cspell) require per-job status checks; job traces 401 via API but public at /-/jobs/<id>/raw."
        source: drupalcode/glab_releases
        cadence: quarterly
        volatility: low
        last_verified: 2026-07-08
      - subject: drupal.org issues & contribution credit
        claim: "Credit is issue-based via the Contribution Records system (issue participants sync automatically; maintainer checks credit boxes on drupal.org; record generates the squash-commit message). DKAN custom modules use GitLab issues on drupalcode (POST projects/<id>/issues via raw glab api); classic d.o. queues are being retired via DA-managed opt-in migration. Undisclosed AI-generated contributions and backfilled/bulk low-effort issues count as credit farming."
        source: drupalorg_credit/gitlab_issues
        cadence: monthly
        volatility: high
        last_verified: 2026-07-08
      - subject: Requirements split
        claim: "hook_requirements split in D11.2 into hook_runtime_requirements / hook_update_requirements / InstallRequirementsInterface (src/Install/Requirements/)."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Recipes & config actions
        claim: "Recipes experimental from D10.3, stabilizing across 11.x; setProperties action added D11.2. Exact action set is version-dependent."
        source: drupal_core/change_records
        cadence: monthly
        volatility: high
        last_verified: 2026-07-08
      - subject: Deprecation testing
        claim: "D11.4 deprecates expectDeprecation()/@group legacy in favor of #[IgnoreDeprecations] + expectUserDeprecationMessage()."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08

  dkan-module-author:
    targets: "DKAN 4.x on Drupal ^10.2 || ^11"
    claims:
      - subject: DKAN 4.x namespaces
        claim: "Submodules are Drupal\\dkan_common, \\dkan_datastore, \\dkan_metastore, \\dkan_harvest; service IDs (dkan.metastore.service, etc.) and REST API unchanged."
        source: dkan/repo
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Internal API stability
        claim: "Service signatures and event constants are not guaranteed stable across DKAN minor releases; verify class/method exists in the installed copy."
        source: dkan/releases
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08

  dkan-core-contributor:
    targets: "DKAN 4.x (GitHub GetDKAN/dkan, 4.x branch)"
    claims:
      - subject: JSON-schema validator migration
        claim: "The justinrainbow -> opis migration landed on 4.x (PRs #4706/#4730): opis/json-schema ^2.4 (metastore SchemaValidator service dkan.metastore.schema_validator) + justinrainbow/json-schema still required on some paths; rooted-json-data ^1.0; m1x0n presenter dropped. Single-sourced in core-internals.md#schema-validation."
        source: dkan/repo
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Branch / CI
        claim: "Active development on 4.x; CircleCI matrix (~10.5 on PHP 8.1-8.4; ~10.6/~11.2/~11.3 on PHP 8.3-8.4) with pcov coverage; phpcs via Qlty config (not a CI job); in-repo PHPUnit harness with DKAN traits (@group dkan / functionalN)."
        source: dkan/repo
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08

  drupal-ai-module:
    targets: "drupal/ai 1.4.x (current stable 1.4.3, a security release; docs verified against 1.3.5; refuses 2.0.x)"
    claims:
      - subject: Version line
        claim: "Skill targets the drupal/ai 1.x line; current stable is 1.4.x (latest 1.4.3, 2026-06-24, a security release; 1.5.x-dev branch open; docs verified against 1.3.5); refuses 2.0.x (2.0.x-dev branch exists — Drupal ^11.2 only, no tagged releases, hidden from the default releases listing; provider lifecycle rework in flight per issue #3577243, not yet a documented breaking-changes list). Single-sourced in SKILL.md rule 3 since 2026-07-08 — reference docs point there, so a version bump is a one-file edit."
        source: drupal_ai/releases
        cadence: monthly
        volatility: high
        last_verified: 2026-07-08
      - subject: Core requirement
        claim: "drupal/ai 1.4.x requires Drupal ^10.5 || ^11.2 (unchanged from 1.3.x)."
        source: drupal_ai/project
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08
      - subject: DKAN grounding module
        claim: "testing-ai-plugins.md patterns are grounded in dkan_ai_query (drupal.org 0.x; renamed 2026-06 from dkan_drupal_ai_query), mock submodule dkan_ai_query_mock."
        source: dkan_ai_query/project
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08

  drupal-mcp-server:
    targets: "mcp_server v2.x-dev on the mcp/sdk 0.6 API (pre-release, volatile)"
    claims:
      - subject: Module + SDK version
        claim: "mcp_server v2.x-dev requires mcp/sdk ^0.6 (0.6.0 tagged 2026-06-02, still latest). Module still pre-stable (first tag 2.0.0-alpha1, 2026-06-11; 2.x-dev active) — expect churn."
        source: mcp_server/project
        cadence: monthly
        volatility: high
        last_verified: 2026-07-08
      - subject: SDK API surface
        claim: "Extension points: #[Tool]/#[ResourceProvider]/prompt/notification plugins; ClientGateway in execute(); checkAccess() gating. mcp_server_tool_bridge (own project, created 2026-06-11; oauth/ui/examples extracted 2026-06-09) bridges drupal/tool tools via McpToolConfig entities."
        source: mcp_server/repo
        cadence: monthly
        volatility: high
        last_verified: 2026-07-08
      - subject: AI-surface threat checklist
        claim: "Security lens anchors to OWASP LLM Top 10 (LLM01 prompt injection, LLM05 improper output handling, LLM06 excessive agency, LLM03 supply chain — 2025 list) and the OWASP Top 10 for Agentic Applications; tool outputs are untrusted (indirect injection); enforce read/write separation + least privilege + human-gated destructive verbs."
        source: ai_security/owasp_llm
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08
      - subject: MCP protocol security
        claim: "MCP-specific risks: tool poisoning, rug pulls (post-approval redefinition), confused deputy, excessive scopes. Mitigate by vetting/pinning consumed servers, least-privilege per-tool scopes, and enforcing checkAccess via a RequestEvent subscriber."
        source: ai_security/mcp_security
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08
      - subject: DKAN MCP modules
        claim: "dkan_mcp_server is a drupal.org contrib project (1.0.x, alpha releases; latest 1.0.0-alpha3, adds the dkan-mcp-server:serve stdio wrapper, tagged DKAN ^4.1.0); the legacy hand-rolled dkan_mcp is retired (no drupal.org project; removed from dkan-site)."
        source: dkan_mcp_server/project
        cadence: monthly
        volatility: high
        last_verified: 2026-07-08

  open-data-dcat:
    targets: "Project Open Data / DCAT-US v1.1 as implemented by DKAN 4.x"
    claims:
      - subject: Spec version
        claim: "DKAN implements POD Metadata Schema v1.1 (~DCAT-US v1.1), trimmed of federal-only fields. The installed schema/collections/*.json is source of truth."
        source: dcat_us/pod_v11
        cadence: quarterly
        volatility: low
        last_verified: 2026-07-08
      - subject: DCAT-US v3
        claim: "DCAT-US v3.0 (RDF/JSON-LD) is the published federal successor standard (v1.1 in transition) but is NOT implemented in DKAN 4.x's JSON schema."
        source: dcat_us/pod_v11
        cadence: quarterly
        volatility: low
        last_verified: 2026-07-08

  dkan-frontend:
    targets: "dkan_js_frontend (core_version_requirement ^10.2 || ^11) + React app + component library"
    claims:
      - subject: Two library lineages
        # Single-sourced in reference/architecture.md since 2026-07-08;
        # SKILL.md (rule 7, cheat sheet, version notes) points there.
        claim: "Current: @civicactions/cmsds-open-data-components 4.x (latest 4.2.0, 2026-06-22; CMS Design System, Node 22). Legacy: @civicactions/data-catalog-components ~1.18 (DKAN 2.x, Node 18)."
        source: dkan_frontend/npm_current
        cadence: monthly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Reference app
        # Single-sourced in reference/architecture.md (same section as the
        # lineages table) since 2026-07-08.
        claim: "data-catalog-app default branch still depends on the legacy data-catalog-components / DKAN 2.x."
        source: dkan_frontend/app
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Dev-server proxy config
        # Lives in reference/build-deploy-customize.md "Local app dev server".
        claim: "data-catalog-app: npm start = Vite dev server on port 3000 (vite.config.ts); VITE_REACT_APP_ROOT_URL=/api/1 (.env.development); server.proxy forwards /api/1 to https://demo.getdkan.org with changeOrigin."
        source: dkan_frontend/app
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08
      - subject: Component detail authority
        # 2026-06-11 (re-checked 2026-07-08): agent-docs/ is not on the repo's
        # main branch (still in draft upstream). Cross-references left as-is
        # pending that landing; closest published artifacts today are
        # COMPONENTS_INVENTORY.md + Storybook.
        claim: "Component-level APIs live in the component library repo's own agent-docs/; this skill cross-references rather than duplicating them."
        source: dkan_frontend/components_current
        cadence: quarterly
        volatility: medium
        last_verified: 2026-07-08
