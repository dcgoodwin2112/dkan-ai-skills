# Skills currency manifest
#
# The version-pinned facts each skill asserts, with the authoritative source to
# verify each against. This centralizes claims that are otherwise scattered across
# SKILL.md "Version notes" sections and inline citations, so currency can be audited
# in one pass instead of re-reading every doc.
#
# Checked by the `/check-skill-currency` repo command (.claude/commands/), which
# fetches each source, flags drift, and bumps `last_verified` on confirmed entries.
# `cadence` sets how often an entry is worth re-checking; `volatility` is how likely
# it is to have changed since `last_verified`.
#
# When you add or materially change a skill, add/adjust its entries here.

meta:
  last_full_review: 2026-06-01
  # Bump when the whole manifest is re-reconciled against sources.

# Where to verify each upstream. Claims reference these by key.
sources:
  drupal_core:
    releases: https://www.drupal.org/project/drupal/releases
    change_records: https://www.drupal.org/list-changes/drupal
    notes: Minor releases land ~every 6 months; change records are continuous.
  drupal_ai:
    project: https://www.drupal.org/project/ai
    releases: https://www.drupal.org/project/ai/releases
    repo: https://git.drupalcode.org/project/ai
  mcp_server:
    project: https://www.drupal.org/project/mcp_server
    repo: https://git.drupalcode.org/project/mcp_server
    sdk: https://github.com/php-mcp/sdk
    notes: Pre-release and volatile; expect churn between checks.
  dkan:
    repo: https://github.com/GetDKAN/dkan
    releases: https://github.com/GetDKAN/dkan/releases
    branch: 4.x
  dkan_frontend:
    app: https://github.com/GetDKAN/data-catalog-app
    components_current: https://github.com/GetDKAN/cmsds-open-data-components
    components_legacy: https://github.com/GetDKAN/data-catalog-components
    npm_current: https://www.npmjs.com/package/@civicactions/cmsds-open-data-components
  dcat_us:
    pod_v11: https://resources.data.gov/resources/dcat-us/
    notes: Slow-moving; DCAT-US v3 (RDF) is the federal direction but not in DKAN 4.x.

skills:

  drupal-module-dev:
    targets: "Drupal ^10.2 || ^11, PHP 8.3"
    claims:
      - subject: PHP / Symfony floor
        claim: "D11.0 raised the floor to PHP 8.3 and Symfony 7."
        source: drupal_core/releases
        cadence: monthly
        volatility: low
        last_verified: 2026-06-01
      - subject: OOP hooks
        claim: "#[Hook] and OOP preprocess support introduced in D11.1; ordering via order: or #[ReorderHook] in D11.2; #[LegacyHook] bridges D10."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01
      - subject: Plugin attribute/annotation timeline
        claim: "Attributes introduced D10.2; omitting the attribute class deprecated ~D11.2; required D12; @Annotation discovery removed D13."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01
      - subject: Entity query accessCheck
        claim: "->accessCheck() mandatory; fatal since D11 if omitted."
        source: drupal_core/change_records
        cadence: quarterly
        volatility: low
        last_verified: 2026-06-01
      - subject: JS once
        claim: "jQuery.once removed in D10; use core/once."
        source: drupal_core/change_records
        cadence: quarterly
        volatility: low
        last_verified: 2026-06-01
      - subject: Removed core modules
        claim: "D11 removed Book, Forum, Statistics, Tracker, Tour, Actions UI to contrib."
        source: drupal_core/releases
        cadence: quarterly
        volatility: low
        last_verified: 2026-06-01
      - subject: Config schema validation
        claim: "Strict config schema checking since D10.2; FullyValidatable constraint added D10.3."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01
      - subject: Requirements split
        claim: "hook_requirements split in D11.2 into hook_runtime_requirements / hook_update_requirements / InstallRequirementsInterface (src/Install/Requirements/)."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01
      - subject: Recipes & config actions
        claim: "Recipes experimental from D10.3, stabilizing across 11.x; setProperties action added D11.2. Exact action set is version-dependent."
        source: drupal_core/change_records
        cadence: monthly
        volatility: high
        last_verified: 2026-06-01
      - subject: Deprecation testing
        claim: "D11.4 deprecates expectDeprecation()/@group legacy in favor of #[IgnoreDeprecations] + expectUserDeprecationMessage()."
        source: drupal_core/change_records
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01

  dkan-module-author:
    targets: "DKAN 4.x on Drupal ^10.2 || ^11"
    claims:
      - subject: DKAN 4.x namespaces
        claim: "Submodules are Drupal\\dkan_common, \\dkan_datastore, \\dkan_metastore, \\dkan_harvest; service IDs (dkan.metastore.service, etc.) and REST API unchanged."
        source: dkan/repo
        cadence: quarterly
        volatility: medium
        last_verified: 2026-06-01
      - subject: Internal API stability
        claim: "Service signatures and event constants are not guaranteed stable across DKAN minor releases; verify class/method exists in the installed copy."
        source: dkan/releases
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01

  dkan-core-contributor:
    targets: "DKAN 4.x (GitHub GetDKAN/dkan, 4.x branch)"
    claims:
      - subject: Branch / CI
        claim: "Active development on 4.x; CircleCI matrix + Qlty/phpcs standards; in-repo PHPUnit harness with DKAN traits (@group dkan / functionalN)."
        source: dkan/repo
        cadence: quarterly
        volatility: medium
        last_verified: 2026-06-01

  drupal-ai-module:
    targets: "drupal/ai 1.3.x (refuses 2.0.x)"
    claims:
      - subject: Version line
        claim: "Skill targets drupal/ai 1.3.x and refuses 2.0.x (breaking provider lifecycle changes)."
        source: drupal_ai/releases
        cadence: monthly
        volatility: high
        last_verified: 2026-06-01
      - subject: Core requirement
        claim: "drupal/ai 1.3.x requires Drupal ^10.5 || ^11.2."
        source: drupal_ai/project
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01

  drupal-mcp-server:
    targets: "mcp_server v2.x-dev on the mcp/sdk 0.6 API (pre-release, volatile)"
    claims:
      - subject: Module + SDK version
        claim: "mcp_server v2.x-dev; mcp/sdk 0.6 API. Pre-release and volatile — expect breaking changes."
        source: mcp_server/project
        cadence: monthly
        volatility: high
        last_verified: 2026-06-01
      - subject: SDK API surface
        claim: "Extension points: #[Tool]/#[ResourceProvider]/prompt/notification plugins; ClientGateway in execute(); checkAccess() gating."
        source: mcp_server/repo
        cadence: monthly
        volatility: high
        last_verified: 2026-06-01

  open-data-dcat:
    targets: "Project Open Data / DCAT-US v1.1 as implemented by DKAN 4.x"
    claims:
      - subject: Spec version
        claim: "DKAN implements POD Metadata Schema v1.1 (~DCAT-US v1.1), trimmed of federal-only fields. The installed schema/collections/*.json is source of truth."
        source: dcat_us/pod_v11
        cadence: quarterly
        volatility: low
        last_verified: 2026-06-01
      - subject: DCAT-US v3
        claim: "DCAT-US v3 (RDF/JSON-LD) is the federal direction but is NOT implemented in DKAN 4.x's JSON schema."
        source: dcat_us/pod_v11
        cadence: quarterly
        volatility: low
        last_verified: 2026-06-01

  dkan-frontend:
    targets: "dkan_js_frontend (core_version_requirement ^10.2 || ^11) + React app + component library"
    claims:
      - subject: Two library lineages
        claim: "Current: @civicactions/cmsds-open-data-components 4.x (CMS Design System, Node 22). Legacy: @civicactions/data-catalog-components ~1.18 (DKAN 2.x, Node 16)."
        source: dkan_frontend/npm_current
        cadence: monthly
        volatility: medium
        last_verified: 2026-06-01
      - subject: Reference app
        claim: "data-catalog-app default branch still depends on the legacy data-catalog-components / DKAN 2.x."
        source: dkan_frontend/app
        cadence: quarterly
        volatility: medium
        last_verified: 2026-06-01
      - subject: Component detail authority
        claim: "Component-level APIs live in the component library repo's own agent-docs/; this skill cross-references rather than duplicating them."
        source: dkan_frontend/components_current
        cadence: quarterly
        volatility: medium
        last_verified: 2026-06-01
